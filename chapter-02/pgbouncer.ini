;;;
;;; pgbouncer.ini — Connection pooler configuration for Beacon v0.2
;;;
;;; Chapter 2 introduces pgbouncer between Django and PostgreSQL.
;;; Without it, each of gunicorn's 9 workers opens its own PostgreSQL
;;; connection, plus the ORM opens extras — exceeding max_connections.
;;;
;;; With pgbouncer, a pool of ~20 persistent connections serves all
;;; workers. This is the single highest-leverage change you can make to
;;; a Django application's database performance after optimizing queries.
;;;
;;; Usage:
;;;   pgbouncer -d pgbouncer.ini
;;;
;;; Then point Django at localhost:6432 instead of localhost:5432.
;;;

[databases]
; Map the database name to the actual PostgreSQL connection.
; pgbouncer connects to localhost:5432 (the real PostgreSQL instance).
beacon_ch2 = host=localhost port=5432 dbname=beacon_ch2

[pgbouncer]
; Listen for Django connections on port 6432.
listen_addr = localhost
listen_port = 6432

; Authentication: pgbouncer uses its own userlist or delegates to PostgreSQL.
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Session pooling: each Django request gets a dedicated connection for
; its entire duration. This is the safest mode for Django because
; Django's ORM can use SET, temporary tables, and cursors that expect
; session-level state.
;
; Transaction pooling (pool_mode = transaction) is more efficient but
; breaks Django features that depend on session state. We use session
; pooling until Chapter 7, when we extract services that can safely use
; transaction pooling.
pool_mode = session

; How Django connects: Django's CONN_MAX_AGE=600 means connections live
; for up to 10 minutes. pgbouncer's server_idle_timeout should be longer
; than CONN_MAX_AGE so that Django's connection manager controls the
; lifecycle, not pgbouncer.
server_idle_timeout = 900

; Pool sizing — the key numbers that matter.
;
; default_pool_size: the maximum number of connections pgbouncer will
;   open to PostgreSQL for this database. With 9 gunicorn workers and
;   session pooling, not all workers are in a database query
;   simultaneously. 20 is enough for 50-200 concurrent users.
;
; reserve_pool_size: extra connections available when the main pool is
;   exhausted. These are opened on demand and closed after
;   reserve_pool_timeout seconds.
;
; max_client_conn: the maximum number of client connections (from
;   Django) that pgbouncer will accept. Set higher than default_pool_size
;   because clients queue when all server connections are busy.
default_pool_size = 20
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 100
max_db_connections = 25

; Administrative settings.
admin_users = beacon_admin
stats_users = beacon_stats

; Logging.
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; Connection limits per user (optional).
; If a single user opens too many connections, cap them here.
; max_user_connections = 10

# Kubernetes Service — Beacon Django (ClusterIP)
# Chapter 14: Observability When Things Go Dark
apiVersion: v1
kind: Service
metadata:
  name: beacon-django
  namespace: beacon-prod
  labels:
    app: beacon
    component: django
    chapter: "14"
spec:
  type: ClusterIP
  selector:
    app: beacon
    component: django
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP

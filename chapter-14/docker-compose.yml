
version: "3.9"
services:
  page-service: {build: {context: ., dockerfile: page-service/Dockerfile}, ports: ["50051:50051"], environment: {BEACON_SERVICE_SECRET: dev-secret, JAEGER_HOST: jaeger, OTEL_SERVICE_NAME: beacon-page-service}, depends_on: [postgres, redis]}
  search-service: {build: {context: ./search-service, dockerfile: Dockerfile}, ports: ["50052:50052"], environment: {PAGE_SERVICE_ADDR: "page-service:50051", ELASTICSEARCH_URL: "http://elasticsearch:9200", KAFKA_BROKERS: "kafka:9092", BEACON_SERVICE_SECRET: dev-secret, JAEGER_HOST: jaeger}, depends_on: [page-service, elasticsearch, kafka]}
  notify-service: {build: {context: ./notify-service, dockerfile: Dockerfile}, ports: ["50053:50053"], environment: {KAFKA_BROKERS: "kafka:9092", BEACON_SERVICE_SECRET: dev-secret}, depends_on: [kafka]}
  collab-service: {build: {context: ./collab-service, dockerfile: Dockerfile}, ports: ["50054:50054"], environment: {REDIS_URL: "redis://redis:6379/1", BEACON_SERVICE_SECRET: dev-secret}, depends_on: [redis]}
  postgres: {image: postgres:16, environment: {POSTGRES_DB: beacon, POSTGRES_USER: beacon, POSTGRES_PASSWORD: beacon_dev_password}, ports: ["5432:5432"], volumes: [pgdata:/var/lib/postgresql/data]}
  redis: {image: redis:7-alpine, ports: ["6379:6379"]}
  elasticsearch: {image: elasticsearch:8.11.0, environment: {discovery.type: single-node, "xpack.security.enabled": "false"}, ports: ["9200:9200"]}
  kafka: {image: confluentinc/cp-kafka:7.5.0, environment: {KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092", KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1}, ports: ["9092:9092"]}
  etcd: {image: quay.io/coreos/etcd:v3.5.9, environment: {ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379", ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"}, ports: ["2379:2379"]}
  jaeger: {image: jaegertracing/all-in-one:1.58, ports: ["6831:6831/udp", "16686:16686"]}
  prometheus: {image: prom/prometheus:v2.53.0, ports: ["9090:9090"], volumes: ["./monitoring/prometheus-rules.yml:/etc/prometheus/rules.yml"]}
volumes: {pgdata:}

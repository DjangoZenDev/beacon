# Kubernetes Deployment — Beacon Django Application
# Chapter 13: Multi-Region / Kubernetes
# 3 replicas per region with resource limits and envFrom for DB config.
# Principle 16: "The speed of light is your budget."

apiVersion: apps/v1
kind: Deployment
metadata:
  name: beacon-django
  namespace: beacon-prod
  labels:
    app: beacon
    component: django
    chapter: "13"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: beacon
      component: django
  template:
    metadata:
      labels:
        app: beacon
        component: django
    spec:
      containers:
        - name: beacon
          image: beacon:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "beacon.settings"
            - name: REGION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['topology.kubernetes.io/region']
          envFrom:
            - configMapRef:
                name: beacon-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: static
              mountPath: /app/static
      volumes:
        - name: static
          emptyDir: {}

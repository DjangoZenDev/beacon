# Kubernetes Ingress — Beacon with TLS
# Chapter 13: Multi-Region / Kubernetes
# TLS termination at the Ingress. Certificates via cert-manager.
# Routes to the beacon-django ClusterIP service.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beacon-ingress
  namespace: beacon-prod
  labels:
    app: beacon
    chapter: "13"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - beacon.example.com
        - "*.beacon.example.com"
      secretName: beacon-tls
  rules:
    - host: beacon.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: beacon-django
                port:
                  number: 80

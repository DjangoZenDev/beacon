# Beacon v0.11 — Docker Compose Service Topology
# Chapter 11: The Feed That Never Sleeps
# Adds Kafka-based feed processing alongside existing services.
version: "3.9"
services:
  beacon:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgres://beacon:beacon_dev@postgres:5432/beacon
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
    depends_on: [postgres, redis, kafka]

  page-service:
    build: {context: ".", dockerfile: "page-service/Dockerfile"}
    ports: ["50051:50051"]
    environment:
      DATABASE_URL: postgres://beacon:beacon_dev@postgres:5432/beacon
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]

  search-service:
    build: {context: "./search-service", dockerfile: "Dockerfile"}
    ports: ["50052:50052"]
    environment:
      PAGE_SERVICE_ADDR: page-service:50051
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on: [page-service, elasticsearch]

  postgres:
    image: postgres:16
    environment: {POSTGRES_DB: beacon, POSTGRES_USER: beacon, POSTGRES_PASSWORD: beacon_dev}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  elasticsearch:
    image: elasticsearch:8.11.0
    environment: {discovery.type: single-node, xpack.security.enabled: "false"}
    ports: ["9200:9200"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment: {KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092, KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1}
    ports: ["9092:9092"]

volumes:
  pgdata:

# Beacon v0.7 — Docker Compose Service Topology
#
# Full local development environment with four services and supporting
# infrastructure. Every engineer runs `docker-compose up` and gets a
# complete Beacon environment.
#
# Services:
#   page-service   : gRPC CRUD for pages and links (port 50051)
#   search-service : gRPC search indexing and querying (port 50052)
#   notify-service : gRPC notification dispatch (port 50053)
#   collab-service : gRPC real-time collaboration (port 50054)
#
# Infrastructure:
#   postgres       : primary database (port 5432)
#   redis          : cache and message broker (port 6379)
#   elasticsearch  : full-text search index (port 9200)
#   kafka          : event streaming (port 9092)

version: "3.9"

services:
  # ── Application Services ────────────────────────────────────

  page-service:
    build:
      context: .
      dockerfile: page-service/Dockerfile
    ports:
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://beacon:beacon_dev_password@postgres:5432/beacon
      REDIS_URL: redis://redis:6379/0
      ETCD_HOST: etcd
      ETCD_PORT: 2379
      BEACON_SERVICE_SECRET: dev-secret-do-not-use-in-production
    depends_on:
      - postgres
      - redis

  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    ports:
      - "50052:50052"
    environment:
      PAGE_SERVICE_ADDR: page-service:50051
      ELASTICSEARCH_URL: http://elasticsearch:9200
      BEACON_SERVICE_SECRET: dev-secret-do-not-use-in-production
    depends_on:
      - page-service
      - elasticsearch

  notify-service:
    build:
      context: ./notify-service
      dockerfile: Dockerfile
    ports:
      - "50053:50053"
    environment:
      PAGE_SERVICE_ADDR: page-service:50051
      KAFKA_BROKERS: kafka:9092
      BEACON_SERVICE_SECRET: dev-secret-do-not-use-in-production
    depends_on:
      - page-service
      - kafka

  collab-service:
    build:
      context: ./collab-service
      dockerfile: Dockerfile
    ports:
      - "50054:50054"
    environment:
      PAGE_SERVICE_ADDR: page-service:50051
      REDIS_URL: redis://redis:6379/1
      BEACON_SERVICE_SECRET: dev-secret-do-not-use-in-production
    depends_on:
      - page-service
      - redis

  # ── Supporting Infrastructure ────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: beacon
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
    ports:
      - "2379:2379"

volumes:
  pgdata:
